services:
  postgres:
    image: postgres:17-alpine
    container_name: portfoliotrack-postgres
    environment:
      POSTGRES_DB: portfoliotrack
      POSTGRES_USER: portfoliotrack
      POSTGRES_PASSWORD: portfoliotrack
    ports:
      - "55432:5432"
    volumes:
      - portfoliotrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfoliotrack -d portfoliotrack"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  portfoliotrack-postgres-data:
